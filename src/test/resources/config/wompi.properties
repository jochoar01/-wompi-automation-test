# ============================================================
# Configuración de conexión a la API de WOMPI
# Ambiente: Sandbox (pruebas)
# ============================================================

# URL base de la API de WOMPI (sandbox)
wompi.baseUrl=https://sandbox.wompi.co/v1

# Llave privada del comercio (reemplazar con la llave real de sandbox)
# IMPORTANTE: nunca subir llaves de producción a control de versiones
wompi.merchantKey=prv_test_changeme

# Timeouts en milisegundos
wompi.connectTimeout=10000
wompi.readTimeout=30000
